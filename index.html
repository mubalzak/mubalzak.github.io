<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Classroom Dashboard — XII-H</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background layers -->
  <div class="bg-glow bg-glow--a"></div>
  <div class="bg-glow bg-glow--b"></div>
  <div class="bg-grid"></div>

  <div class="dashboard">

    <!-- ============ HEADER ============ -->
    <header class="header">
      <div class="header__brand">
        <div class="header__logo" id="schoolLogo">
          <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true">
            <polygon points="32,4 60,18 32,32 4,18" fill="none" stroke="#FFD700" stroke-width="2"/>
            <path d="M12 22 V40 Q32 52 52 40 V22" fill="none" stroke="#FFD700" stroke-width="2"/>
            <line x1="32" y1="32" x2="32" y2="46" stroke="#FFD700" stroke-width="2"/>
            <circle cx="32" cy="47" r="2.4" fill="#FFD700"/>
          </svg>
        </div>
        <div class="header__titles">
          <h1 class="header__school" id="schoolName">🏫 SMA NEGERI 2 TUBAN</h1>
          <div class="header__meta">
            <span class="chip chip--book" id="className">📖 SOSHUM CLASS</span>
            <span class="chip chip--medal" id="classCode">🎖 XII-H • HISTORIC</span>
          </div>
        </div>
      </div>

      <div class="header__time">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date">Memuat tanggal…</div>
      </div>
    </header>

    <!-- ============ MARQUEE ============ -->
    <div class="marquee">
      <div class="marquee__track" id="marqueeTrack">
        <!-- filled by JS, duplicated for seamless loop -->
      </div>
    </div>

    <!-- ============ MAIN ============ -->
    <main class="main">

      <!-- LEFT: Full schedule of the day -->
      <section class="panel panel--schedule">
        <div class="panel__head">
          <h2>Jadwal Hari Ini</h2>
          <span class="panel__day" id="todayLabel">Senin</span>
        </div>
        <div class="schedule-list" id="scheduleList">
          <!-- filled by JS -->
        </div>
      </section>

      <!-- RIGHT: Status cards -->
      <section class="side">

        <div class="card card--now" id="nowCard">
          <div class="card__tag">
            <span class="dot dot--pulse"></span> SEDANG BERLANGSUNG
          </div>
          <div class="card__subject" id="nowSubject">—</div>
          <div class="card__teacher" id="nowTeacher">—</div>
          <div class="card__timerow">
            <div class="card__time" id="nowTime">--:-- – --:--</div>
            <div class="card__countdown" id="nowCountdown">--:--</div>
          </div>
          <div class="progress">
            <div class="progress__bar" id="nowProgress"></div>
          </div>
        </div>

        <div class="card card--next" id="nextCard">
          <div class="card__tag card__tag--next">SELANJUTNYA</div>
          <div class="card__subject" id="nextSubject">—</div>
          <div class="card__teacher" id="nextTeacher">—</div>
          <div class="card__time" id="nextTime">--:-- – --:--</div>
        </div>

        <div class="card card--stats">
          <div class="stat">
            <span class="stat__num" id="statTotal">0</span>
            <span class="stat__label">Jam Pelajaran</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__num" id="statDone">0</span>
            <span class="stat__label">Selesai</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__num" id="statLeft">0</span>
            <span class="stat__label">Tersisa</span>
          </div>
        </div>

      </section>
    </main>

    <!-- ============ FOOTER ============ -->
    <footer class="footer">
      <span>SMA NEGERI 2 TUBAN &nbsp;•&nbsp; Smart Classroom Dashboard &nbsp;•&nbsp; Kelas XII-H</span>
      <span class="footer__live"><span class="dot dot--live"></span> LIVE</span>
    </footer>

  </div>

  <button class="fs-btn" id="fsBtn" title="Fullscreen">⛶</button>

  <script src="script.js"></script>
</body>
</html>
